<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" role="img" aria-label="Wiener Entkernung">
  <!-- Abstract hammer: head + short handle, slightly tilted for energy -->
  <g transform="translate(32 34) rotate(-18) translate(-32 -34)">
    <!-- Head -->
    <rect x="14" y="14" width="36" height="14" rx="2.5" fill="#101820"/>
    <!-- Striking face accent -->
    <rect x="14" y="14" width="7" height="14" rx="2.5" fill="#F2AA4C"/>
    <!-- Handle -->
    <rect x="27" y="26" width="10" height="26" rx="2.5" fill="#101820"/>
  </g>
</svg>
