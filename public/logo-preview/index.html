<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Logo Preview – Wiener Entkernung</title>
    <style>
      :root {
        color-scheme: dark;
      }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: system-ui, sans-serif;
        background: #101820;
        color: #fff;
        padding: 2rem 1.25rem 3rem;
      }
      h1 {
        margin: 0 0 0.35rem;
        font-size: 1.35rem;
      }
      p {
        margin: 0 0 1.75rem;
        color: rgba(255, 255, 255, 0.55);
        font-size: 0.95rem;
      }
      .grid {
        display: grid;
        gap: 1rem;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        max-width: 720px;
      }
      .card {
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 12px;
        padding: 1.25rem;
        background: rgba(255, 255, 255, 0.03);
      }
      .card h2 {
        margin: 0 0 0.75rem;
        font-size: 0.8rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: #f2aa4c;
      }
      .preview {
        display: grid;
        place-items: center;
        aspect-ratio: 1;
        border-radius: 10px;
        background: #fff;
        margin-bottom: 0.75rem;
      }
      .preview.dark {
        background: #101820;
        border: 1px solid rgba(255, 255, 255, 0.08);
      }
      .preview img {
        width: 72%;
        height: 72%;
        object-fit: contain;
      }
      .sizes {
        display: flex;
        align-items: center;
        gap: 0.75rem;
      }
      .sizes span {
        font-size: 0.7rem;
        color: rgba(255, 255, 255, 0.4);
      }
      .sizes img {
        width: 16px;
        height: 16px;
        object-fit: contain;
        background: #fff;
        border-radius: 3px;
      }
      .sizes img:nth-child(2) {
        width: 24px;
        height: 24px;
      }
      .sizes img:nth-child(3) {
        width: 32px;
        height: 32px;
      }
    </style>
  </head>
  <body>
    <h1>Logo-Vorschläge</h1>
    <p>Noch nicht eingebaut – sag welche Variante.</p>
    <div class="grid">
      <article class="card">
        <h2>A · Mark (aufrecht)</h2>
        <div class="preview">
          <img src="./hammer-mark.svg" alt="Hammer Mark" />
        </div>
        <div class="sizes">
          <img src="./hammer-mark.svg" alt="" />
          <img src="./hammer-mark.svg" alt="" />
          <img src="./hammer-mark.svg" alt="" />
          <span>klein</span>
        </div>
      </article>
      <article class="card">
        <h2>B · Schräg</h2>
        <div class="preview">
          <img src="./hammer-abstract.svg" alt="Hammer Abstract" />
        </div>
        <div class="sizes">
          <img src="./hammer-abstract.svg" alt="" />
          <img src="./hammer-abstract.svg" alt="" />
          <img src="./hammer-abstract.svg" alt="" />
          <span>klein</span>
        </div>
      </article>
      <article class="card">
        <h2>C · Badge</h2>
        <div class="preview dark">
          <img src="./hammer-badge.svg" alt="Hammer Badge" />
        </div>
        <div class="sizes">
          <img src="./hammer-badge.svg" alt="" />
          <img src="./hammer-badge.svg" alt="" />
          <img src="./hammer-badge.svg" alt="" />
          <span>klein</span>
        </div>
      </article>
    </div>
  </body>
</html>
